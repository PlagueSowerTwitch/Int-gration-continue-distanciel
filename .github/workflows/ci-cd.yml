name: CI/CD Pipeline — TodoApp

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_BACKEND: ${{ secrets.DOCKER_USERNAME }}/todoapp-backend
  IMAGE_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/todoapp-frontend

jobs:
  # ══════════════════════════════════════════════════════════════════════
  # JOB 1 — Tests
  # ══════════════════════════════════════════════════════════════════════
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: tododb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Backend tests ──────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Run backend tests
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: testpassword
          DB_NAME: tododb_test
          JWT_SECRET: test_secret_ci
          NODE_ENV: test
        run: npm test

      # ── Frontend tests ─────────────────────────────────────────────
      - name: Setup Node.js (frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test

  # ══════════════════════════════════════════════════════════════════════
  # JOB 2 — Build & Push Docker images
  # (Uniquement sur push vers main, pas sur PR)
  # ══════════════════════════════════════════════════════════════════════
  build-push:
    name: 🐳 Build & Push Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════════════════════════════════════════════
  # JOB 3 — Déploiement sur VM Azure via SSH + Kubernetes
  # ══════════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Déploiement VM Azure + K8s
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Déploiement sur VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 120s
          script: |
            set -e

            echo "📥 Pull des dernières images Docker..."
            docker pull ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            docker pull ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

            echo "🔑 Mise à jour des secrets Kubernetes..."
            sudo kubectl create secret generic todoapp-secrets \
              --namespace=todoapp \
              --from-literal=DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              --from-literal=JWT_SECRET='${{ secrets.JWT_SECRET }}' \
              --dry-run=client -o yaml | sudo kubectl apply -f -

            echo "🔄 Mise à jour des images dans les déploiements K8s..."
            sudo kubectl set image deployment/backend \
              backend=${{ env.IMAGE_BACKEND }}:${{ github.sha }} \
              --namespace=todoapp

            sudo kubectl set image deployment/frontend \
              frontend=${{ env.IMAGE_FRONTEND }}:${{ github.sha }} \
              --namespace=todoapp

            echo "⏳ Attente du rollout backend..."
            sudo kubectl rollout status deployment/backend --namespace=todoapp --timeout=120s

            echo "⏳ Attente du rollout frontend..."
            sudo kubectl rollout status deployment/frontend --namespace=todoapp --timeout=120s

            echo "✅ Déploiement terminé avec succès !"
            echo "🌐 Application accessible sur http://${{ secrets.VM_HOST }}:30080"

      - name: Vérification santé après déploiement
        run: |
          echo "🔍 Vérification du endpoint /health..."
          sleep 15
          curl --fail --retry 5 --retry-delay 5 \
            http://${{ secrets.VM_HOST }}:30081/health \
            && echo "✅ API en bonne santé" \
            || echo "⚠️ Le health check a échoué"